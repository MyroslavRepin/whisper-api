services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - .env
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8080
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "3.0"
          memory: 3000m
        reservations:
          memory: 1500m
