services:
  backend:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - /app/.venv
    env_file:
      - .env
    command: uv run uvicorn main:app --host 0.0.0.0 --port 8080 --reload
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0
